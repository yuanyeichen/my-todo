<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事项</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #e0e7ff 0%, #f3e8ff 100%);
            height: 100vh;
            display: flex;
            color: #1c1c1e;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.4);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 12px;
            color: #111;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #3a3a3c;
            transition: background 0.2s;
        }
        .nav-item:hover { background: rgba(0,0,0,0.04); }
        .nav-item.active { background: rgba(0,0,0,0.07); color: #000; }
        .nav-icon {
            width: 26px; height: 26px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #fff;
        }
        .icon-all { background: #8e8e93; }
        .icon-today { background: #007aff; }
        .icon-done { background: #34c759; }
        .icon-undone { background: #ff9500; }
        .nav-count {
            margin-left: auto;
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .nav-item.active .nav-count { background: rgba(0,0,0,0.08); color: #555; }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 40px 50px 100px;
            overflow-y: auto;
        }
        .header {
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .header .subtitle {
            font-size: 15px;
            color: #636366;
            font-weight: 500;
        }

        /* Task List */
        .task-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(31,38,135,0.07);
            overflow: hidden;
        }
        .task-list { list-style: none; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: background 0.15s;
            animation: slideIn 0.25s ease both;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: rgba(0,0,0,0.015); }

        /* Custom Checkbox */
        .check-circle {
            width: 22px; height: 22px;
            border: 2px solid #c7c7cc;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            margin-right: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .check-circle svg {
            width: 12px; height: 12px;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
        }
        .task-item.completed .check-circle {
            background: #ff9500;
            border-color: #ff9500;
        }
        .task-item.completed .check-circle svg {
            opacity: 1;
            transform: scale(1);
        }
        .task-item.completed .task-text {
            color: #8e8e93;
            text-decoration: line-through;
        }

        .task-text {
            flex: 1;
            font-size: 15.5px;
            font-weight: 500;
            color: #1c1c1e;
            transition: color 0.2s;
        }
        .task-date {
            font-size: 12px;
            color: #8e8e93;
            margin-right: 12px;
        }
        .delete-btn {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #ff3b30;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255,59,48,0.08); }
        .delete-btn svg { width: 16px; height: 16px; }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #8e8e93;
            text-align: center;
        }
        .empty-icon {
            width: 70px; height: 70px;
            background: rgba(0,0,0,0.03);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            font-size: 28px;
        }
        .empty-title { font-size: 18px; font-weight: 600; color: #636366; margin-bottom: 4px; }
        .empty-desc { font-size: 14px; }

        /* Bottom Input Bar */
        .input-bar {
            position: absolute;
            bottom: 28px;
            left: 50px;
            right: 50px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(31,38,135,0.1);
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
        }
        .plus-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #ff9500;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 300;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15.5px;
            font-weight: 500;
            outline: none;
            color: #1c1c1e;
        }
        .input-bar input::placeholder { color: #8e8e93; }
        .input-bar button {
            padding: 7px 16px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-bar button:hover { background: #0051d5; }

        @media (max-width: 820px) {
            .sidebar { display: none; }
            .main { padding: 24px 20px 90px; }
            .input-bar { left: 20px; right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>提醒事项</h2>
        <div class="nav-item active" data-filter="all">
            <div class="nav-icon icon-all">&#9776;</div>
            <span>全部</span>
            <span class="nav-count" id="count-all">0</span>
        </div>
        <div class="nav-item" data-filter="today">
            <div class="nav-icon icon-today">&#9733;</div>
            <span>今天</span>
            <span class="nav-count" id="count-today">0</span>
        </div>
        <div class="nav-item" data-filter="undone">
            <div class="nav-icon icon-undone">&#9675;</div>
            <span>未完成</span>
            <span class="nav-count" id="count-undone">0</span>
        </div>
        <div class="nav-item" data-filter="done">
            <div class="nav-icon icon-done">&#10003;</div>
            <span>已完成</span>
            <span class="nav-count" id="count-done">0</span>
        </div>
    </aside>

    <main class="main">
        <div class="header">
            <h1 id="page-title">全部</h1>
            <div class="subtitle" id="page-subtitle">管理你的日常任务</div>
        </div>

        <div class="task-card">
            <ul class="task-list" id="todo-list"></ul>
            <div class="empty-state" id="empty-state" style="display:none;">
                <div class="empty-icon">&#128466;</div>
                <div class="empty-title">暂无任务</div>
                <div class="empty-desc">在下方添加一项新任务吧</div>
            </div>
        </div>

        <div class="input-bar">
            <div class="plus-icon">+</div>
            <input type="text" id="input" placeholder="添加新任务…">
            <button id="btn">添加</button>
        </div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        const titles = {
            all: '全部',
            today: '今天',
            undone: '未完成',
            done: '已完成'
        };

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateCounts();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            if (isToday) return '今天';
            return `${d.getMonth()+1}月${d.getDate()}日`;
        }

        function updateCounts() {
            const now = new Date();
            const todayTasks = tasks.filter(t => {
                const d = new Date(t.createdAt);
                return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            document.getElementById('count-all').textContent = tasks.length;
            document.getElementById('count-today').textContent = todayTasks.length;
            document.getElementById('count-undone').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('count-done').textContent = tasks.filter(t => t.completed).length;
        }

        function renderList() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';

            const now = new Date();
            let filtered = tasks.filter((t, i) => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'done') return t.completed;
                if (currentFilter === 'undone') return !t.completed;
                if (currentFilter === 'today') {
                    const d = new Date(t.createdAt);
                    return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }
                return true;
            });

            // 未完成的排前面
            filtered.sort((a, b) => a.completed - b.completed);

            if (filtered.length === 0) {
                document.getElementById('empty-state').style.display = 'flex';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                filtered.forEach(task => {
                    const realIndex = tasks.indexOf(task);
                    const li = document.createElement('li');
                    li.className = 'task-item' + (task.completed ? ' completed' : '');

                    const check = document.createElement('div');
                    check.className = 'check-circle';
                    check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    check.addEventListener('click', () => {
                        task.completed = !task.completed;
                        saveTasks();
                        renderList();
                    });

                    const text = document.createElement('div');
                    text.className = 'task-text';
                    text.textContent = task.text;

                    const date = document.createElement('div');
                    date.className = 'task-date';
                    date.textContent = formatDate(task.createdAt);

                    const del = document.createElement('div');
                    del.className = 'delete-btn';
                    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                    del.addEventListener('click', () => {
                        tasks.splice(realIndex, 1);
                        saveTasks();
                        renderList();
                    });

                    li.appendChild(check);
                    li.appendChild(text);
                    li.appendChild(date);
                    li.appendChild(del);
                    list.appendChild(li);
                });
            }
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentFilter = item.dataset.filter;
                document.getElementById('page-title').textContent = titles[currentFilter];
                renderList();
            });
        });

        function addTask() {
            const value = document.getElementById('input').value.trim();
            if (value) {
                tasks.unshift({ text: value, completed: false, createdAt: new Date().toISOString() });
                saveTasks();
                document.getElementById('input').value = '';
                renderList();
            }
        }

        document.getElementById('btn').addEventListener('click', addTask);
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        updateCounts();
        renderList();
    </script>
</body>
</html>
