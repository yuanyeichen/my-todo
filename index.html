<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提醒事项</title>
    <style>
        :root {
            --bg-gradient-start: #e0e7ff;
            --bg-gradient-end: #f3e8ff;
            --sidebar-bg: rgba(255,255,255,0.55);
            --sidebar-border: rgba(255,255,255,0.4);
            --text-primary: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-tertiary: #636366;
            --text-muted: #8e8e93;
            --card-bg: rgba(255,255,255,0.75);
            --card-border: rgba(255,255,255,0.5);
            --card-shadow: rgba(31,38,135,0.07);
            --hover-bg: rgba(0,0,0,0.04);
            --active-bg: rgba(0,0,0,0.07);
            --inputbar-bg: rgba(255,255,255,0.85);
            --inputbar-shadow: rgba(31,38,135,0.1);
            --divider: rgba(0,0,0,0.04);
            --empty-icon-bg: rgba(0,0,0,0.03);
            --accent-orange: #ff9500;
            --accent-blue: #007aff;
            --accent-red: #ff3b30;
        }

        @media (prefers-color-scheme: dark) {
            :root:not(.force-light) {
                --bg-gradient-start: #0f0f1a;
                --bg-gradient-end: #1a1025;
                --sidebar-bg: rgba(30,30,35,0.55);
                --sidebar-border: rgba(255,255,255,0.08);
                --text-primary: #ffffff;
                --text-secondary: #ebebf5;
                --text-tertiary: #a1a1aa;
                --text-muted: #8e8e93;
                --card-bg: rgba(30,30,35,0.7);
                --card-border: rgba(255,255,255,0.08);
                --card-shadow: rgba(0,0,0,0.3);
                --hover-bg: rgba(255,255,255,0.05);
                --active-bg: rgba(255,255,255,0.08);
                --inputbar-bg: rgba(40,40,48,0.8);
                --inputbar-shadow: rgba(0,0,0,0.4);
                --divider: rgba(255,255,255,0.06);
                --empty-icon-bg: rgba(255,255,255,0.06);
                --accent-orange: #ff9f0a;
                --accent-blue: #0a84ff;
                --accent-red: #ff453a;
            }
        }

        :root.force-dark {
            --bg-gradient-start: #0f0f1a;
            --bg-gradient-end: #1a1025;
            --sidebar-bg: rgba(30,30,35,0.55);
            --sidebar-border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #ebebf5;
            --text-tertiary: #a1a1aa;
            --text-muted: #8e8e93;
            --card-bg: rgba(30,30,35,0.7);
            --card-border: rgba(255,255,255,0.08);
            --card-shadow: rgba(0,0,0,0.3);
            --hover-bg: rgba(255,255,255,0.05);
            --active-bg: rgba(255,255,255,0.08);
            --inputbar-bg: rgba(40,40,48,0.8);
            --inputbar-shadow: rgba(0,0,0,0.4);
            --divider: rgba(255,255,255,0.06);
            --empty-icon-bg: rgba(255,255,255,0.06);
            --accent-orange: #ff9f0a;
            --accent-blue: #0a84ff;
            --accent-red: #ff453a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            height: 100vh;
            display: flex;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--sidebar-border);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 12px;
            color: var(--text-primary);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--hover-bg); }
        .nav-item.active { background: var(--active-bg); color: var(--text-primary); }
        .nav-icon {
            width: 26px; height: 26px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #fff;
        }
        .icon-all { background: #8e8e93; }
        .icon-today { background: var(--accent-blue); }
        .icon-done { background: #34c759; }
        .icon-undone { background: var(--accent-orange); }
        .nav-count {
            margin-left: auto;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--hover-bg);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .nav-item.active .nav-count { background: var(--active-bg); color: var(--text-tertiary); }

        .theme-toggle {
            margin-top: auto;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            user-select: none;
        }
        .theme-toggle:hover { background: var(--hover-bg); }
        .theme-icon { font-size: 16px; }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 40px 50px 100px;
            overflow-y: auto;
        }
        .header {
            margin-bottom: 20px;
        }
        .header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .header .subtitle {
            font-size: 15px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-bottom: 14px;
        }

        /* Search */
        .search-box {
            position: relative;
            max-width: 300px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Task List */
        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px var(--card-shadow);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .task-list { list-style: none; overflow-y: auto; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--divider);
            transition: background 0.15s;
            animation: slideIn 0.25s ease both;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: var(--hover-bg); }

        /* Custom Checkbox */
        .check-circle {
            width: 22px; height: 22px;
            border: 2px solid #c7c7cc;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            margin-right: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .check-circle svg {
            width: 12px; height: 12px;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
        }
        .task-item.completed .check-circle {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }
        .task-item.completed .check-circle svg {
            opacity: 1;
            transform: scale(1);
        }
        .task-item.completed .task-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .task-text {
            flex: 1;
            font-size: 15.5px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.2s;
            cursor: text;
            padding: 2px 4px;
            margin: -2px -4px;
            border-radius: 6px;
        }
        .task-text:hover { background: var(--hover-bg); }
        .task-text[contenteditable="true"] {
            background: var(--sidebar-bg);
            outline: 2px solid var(--accent-blue);
            text-decoration: none !important;
            color: var(--text-primary) !important;
        }
        .task-date {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 12px;
            flex-shrink: 0;
        }
        .delete-btn {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--accent-red);
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255,69,58,0.08); }
        .delete-btn svg { width: 16px; height: 16px; }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
            flex: 1;
        }
        .empty-icon {
            width: 70px; height: 70px;
            background: var(--empty-icon-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            font-size: 28px;
        }
        .empty-title { font-size: 18px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px; }
        .empty-desc { font-size: 14px; }

        /* Bottom Input Bar */
        .input-bar {
            position: absolute;
            bottom: 28px;
            left: 50px;
            right: 50px;
            background: var(--inputbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px var(--inputbar-shadow);
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
        }
        .plus-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--accent-orange);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 300;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15.5px;
            font-weight: 500;
            outline: none;
            color: var(--text-primary);
        }
        .input-bar input::placeholder { color: var(--text-muted); }
        .input-bar button {
            padding: 7px 16px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-bar button:hover { background: #0051d5; }

        @media (max-width: 820px) {
            .sidebar { display: none; }
            .main { padding: 24px 20px 90px; }
            .input-bar { left: 20px; right: 20px; bottom: 20px; }
            .search-box { max-width: none; width: 100%; margin-top: 10px; }
            .header-top { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>提醒事项</h2>
        <div class="nav-item active" data-filter="all">
            <div class="nav-icon icon-all">&#9776;</div>
            <span>全部</span>
            <span class="nav-count" id="count-all">0</span>
        </div>
        <div class="nav-item" data-filter="today">
            <div class="nav-icon icon-today">&#9733;</div>
            <span>今天</span>
            <span class="nav-count" id="count-today">0</span>
        </div>
        <div class="nav-item" data-filter="undone">
            <div class="nav-icon icon-undone">&#9675;</div>
            <span>未完成</span>
            <span class="nav-count" id="count-undone">0</span>
        </div>
        <div class="nav-item" data-filter="done">
            <div class="nav-icon icon-done">&#10003;</div>
            <span>已完成</span>
            <span class="nav-count" id="count-done">0</span>
        </div>

        <div class="theme-toggle" id="theme-toggle">
            <span class="theme-icon" id="theme-icon">&#127769;</span>
            <span id="theme-text">切换深色模式</span>
        </div>
    </aside>

    <main class="main">
        <div class="header">
            <div class="header-top">
                <h1 id="page-title">全部</h1>
                <div class="search-box">
                    <span class="search-icon">&#128269;</span>
                    <input type="text" id="search" placeholder="搜索任务…">
                </div>
            </div>
            <div class="subtitle" id="page-subtitle">管理你的日常任务</div>
        </div>

        <div class="task-card">
            <ul class="task-list" id="todo-list"></ul>
            <div class="empty-state" id="empty-state" style="display:none;">
                <div class="empty-icon">&#128466;</div>
                <div class="empty-title">暂无任务</div>
                <div class="empty-desc">在下方添加一项新任务吧</div>
            </div>
        </div>

        <div class="input-bar">
            <div class="plus-icon">+</div>
            <input type="text" id="input" placeholder="添加新任务…">
            <button id="btn">添加</button>
        </div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';
        let searchQuery = '';

        const titles = {
            all: '全部',
            today: '今天',
            undone: '未完成',
            done: '已完成'
        };

        /* Theme */
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        function applyTheme(isDark) {
            const root = document.documentElement;
            if (isDark) {
                root.classList.add('force-dark');
                root.classList.remove('force-light');
                document.getElementById('theme-icon').textContent = '☀️';
                document.getElementById('theme-text').textContent = '切换浅色模式';
            } else {
                root.classList.add('force-light');
                root.classList.remove('force-dark');
                document.getElementById('theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = '切换深色模式';
            }
        }
        if (savedTheme === 'dark') applyTheme(true);
        else if (savedTheme === 'light') applyTheme(false);
        else applyTheme(systemDark);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('force-dark');
            applyTheme(!isDark);
            localStorage.setItem('theme', !isDark ? 'dark' : 'light');
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches);
        });

        /* Data */
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateCounts();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            if (isToday) return '今天';
            return `${d.getMonth()+1}月${d.getDate()}日`;
        }

        function updateCounts() {
            const now = new Date();
            const todayTasks = tasks.filter(t => {
                const d = new Date(t.createdAt);
                return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            document.getElementById('count-all').textContent = tasks.length;
            document.getElementById('count-today').textContent = todayTasks.length;
            document.getElementById('count-undone').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('count-done').textContent = tasks.filter(t => t.completed).length;
        }

        /* Render */
        function getFilteredTasks() {
            const now = new Date();
            return tasks.filter(t => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'done') return t.completed;
                if (currentFilter === 'undone') return !t.completed;
                if (currentFilter === 'today') {
                    const d = new Date(t.createdAt);
                    return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }
                return true;
            }).filter(t => t.text.toLowerCase().includes(searchQuery.toLowerCase()));
        }

        function renderList() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';

            let filtered = getFilteredTasks();
            filtered.sort((a, b) => a.completed - b.completed);

            if (filtered.length === 0) {
                document.getElementById('empty-state').style.display = 'flex';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                filtered.forEach(task => {
                    const realIndex = tasks.indexOf(task);
                    const li = document.createElement('li');
                    li.className = 'task-item' + (task.completed ? ' completed' : '');

                    const check = document.createElement('div');
                    check.className = 'check-circle';
                    check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    check.addEventListener('click', () => {
                        task.completed = !task.completed;
                        saveTasks();
                        renderList();
                    });

                    const text = document.createElement('div');
                    text.className = 'task-text';
                    text.textContent = task.text;
                    text.title = '双击编辑';
                    text.addEventListener('dblclick', () => {
                        if (text.isContentEditable) return;
                        text.contentEditable = true;
                        text.focus();
                        const range = document.createRange();
                        range.selectNodeContents(text);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                    });
                    text.addEventListener('blur', () => {
                        const newText = text.textContent.trim();
                        if (newText) {
                            task.text = newText;
                            saveTasks();
                        }
                        text.textContent = task.text;
                        text.contentEditable = false;
                    });
                    text.addEventListener('keydown', e => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            text.blur();
                        } else if (e.key === 'Escape') {
                            text.textContent = task.text;
                            text.contentEditable = false;
                        }
                    });

                    const date = document.createElement('div');
                    date.className = 'task-date';
                    date.textContent = formatDate(task.createdAt);

                    const del = document.createElement('div');
                    del.className = 'delete-btn';
                    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                    del.addEventListener('click', () => {
                        tasks.splice(realIndex, 1);
                        saveTasks();
                        renderList();
                    });

                    li.appendChild(check);
                    li.appendChild(text);
                    li.appendChild(date);
                    li.appendChild(del);
                    list.appendChild(li);
                });
            }
        }

        /* Nav */
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentFilter = item.dataset.filter;
                document.getElementById('page-title').textContent = titles[currentFilter];
                renderList();
            });
        });

        /* Search */
        document.getElementById('search').addEventListener('input', e => {
            searchQuery = e.target.value.trim();
            renderList();
        });

        /* Add Task */
        function addTask() {
            const value = document.getElementById('input').value.trim();
            if (value) {
                tasks.unshift({ text: value, completed: false, createdAt: new Date().toISOString() });
                saveTasks();
                document.getElementById('input').value = '';
                renderList();
            }
        }
        document.getElementById('btn').addEventListener('click', addTask);
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        /* Init */
        updateCounts();
        renderList();
    </script>
</body>
</html>
