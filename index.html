<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .input-group {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            width: 220px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎使用</h1>
        <div class="input-group">
            <input type="text" id="input" placeholder="请输入内容">
            <button id="btn">添加</button>
        </div>
        <ul id="todo-list" style="list-style: none; padding: 0; margin-top: 30px; text-align: left;"></ul>
    </div>
    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTask(text, completed, index) {
            const li = document.createElement('li');
            li.style.padding = '10px';
            li.style.borderBottom = '1px solid #eee';
            li.style.display = 'flex';
            li.style.alignItems = 'center';
            li.style.justifyContent = 'space-between';

            const left = document.createElement('div');
            left.style.display = 'flex';
            left.style.alignItems = 'center';
            left.style.gap = '10px';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = completed;
            checkbox.addEventListener('change', function() {
                tasks[index].completed = this.checked;
                saveTasks();
                span.style.textDecoration = this.checked ? 'line-through' : 'none';
                span.style.color = this.checked ? '#999' : '#333';
            });

            const span = document.createElement('span');
            span.textContent = text;
            span.style.color = completed ? '#999' : '#333';
            span.style.textDecoration = completed ? 'line-through' : 'none';

            const delBtn = document.createElement('button');
            delBtn.textContent = '删除';
            delBtn.style.padding = '5px 10px';
            delBtn.style.fontSize = '12px';
            delBtn.style.background = '#e74c3c';
            delBtn.style.border = 'none';
            delBtn.style.borderRadius = '4px';
            delBtn.style.color = 'white';
            delBtn.style.cursor = 'pointer';
            delBtn.addEventListener('click', function() {
                tasks.splice(index, 1);
                saveTasks();
                li.remove();
            });

            left.appendChild(checkbox);
            left.appendChild(span);
            li.appendChild(left);
            li.appendChild(delBtn);
            document.getElementById('todo-list').appendChild(li);
        }

        tasks.forEach((task, index) => {
            renderTask(task.text, task.completed, index);
        });

        document.getElementById('btn').addEventListener('click', function() {
            const value = document.getElementById('input').value;
            if (value.trim()) {
                tasks.push({ text: value, completed: false });
                saveTasks();
                renderTask(value, false, tasks.length - 1);
                document.getElementById('input').value = '';
            }
        });
    </script>
</body>
</html>
