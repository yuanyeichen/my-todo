<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff9500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="提醒事项">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>提醒事项</title>
    <style>
        :root {
            --bg-gradient-start: #e0e7ff;
            --bg-gradient-end: #f3e8ff;
            --sidebar-bg: rgba(255,255,255,0.55);
            --sidebar-border: rgba(255,255,255,0.4);
            --text-primary: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-tertiary: #636366;
            --text-muted: #8e8e93;
            --card-bg: rgba(255,255,255,0.75);
            --card-border: rgba(255,255,255,0.5);
            --card-shadow: rgba(31,38,135,0.07);
            --hover-bg: rgba(0,0,0,0.04);
            --active-bg: rgba(0,0,0,0.07);
            --inputbar-bg: rgba(255,255,255,0.85);
            --inputbar-shadow: rgba(31,38,135,0.1);
            --divider: rgba(0,0,0,0.04);
            --empty-icon-bg: rgba(0,0,0,0.03);
            --accent-orange: #ff9500;
            --accent-blue: #007aff;
            --accent-red: #ff3b30;
            --accent-yellow: #ffcc00;
            --accent-purple: #af52de;
        }

        @media (prefers-color-scheme: dark) {
            :root:not(.force-light) {
                --bg-gradient-start: #0f0f1a;
                --bg-gradient-end: #1a1025;
                --sidebar-bg: rgba(30,30,35,0.55);
                --sidebar-border: rgba(255,255,255,0.08);
                --text-primary: #ffffff;
                --text-secondary: #ebebf5;
                --text-tertiary: #a1a1aa;
                --text-muted: #8e8e93;
                --card-bg: rgba(30,30,35,0.7);
                --card-border: rgba(255,255,255,0.08);
                --card-shadow: rgba(0,0,0,0.3);
                --hover-bg: rgba(255,255,255,0.05);
                --active-bg: rgba(255,255,255,0.08);
                --inputbar-bg: rgba(40,40,48,0.8);
                --inputbar-shadow: rgba(0,0,0,0.4);
                --divider: rgba(255,255,255,0.06);
                --empty-icon-bg: rgba(255,255,255,0.06);
                --accent-orange: #ff9f0a;
                --accent-blue: #0a84ff;
                --accent-red: #ff453a;
                --accent-yellow: #ffd60a;
                --accent-purple: #bf5af2;
            }
        }

        :root.force-dark {
            --bg-gradient-start: #0f0f1a;
            --bg-gradient-end: #1a1025;
            --sidebar-bg: rgba(30,30,35,0.55);
            --sidebar-border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #ebebf5;
            --text-tertiary: #a1a1aa;
            --text-muted: #8e8e93;
            --card-bg: rgba(30,30,35,0.7);
            --card-border: rgba(255,255,255,0.08);
            --card-shadow: rgba(0,0,0,0.3);
            --hover-bg: rgba(255,255,255,0.05);
            --active-bg: rgba(255,255,255,0.08);
            --inputbar-bg: rgba(40,40,48,0.8);
            --inputbar-shadow: rgba(0,0,0,0.4);
            --divider: rgba(255,255,255,0.06);
            --empty-icon-bg: rgba(255,255,255,0.06);
            --accent-orange: #ff9f0a;
            --accent-blue: #0a84ff;
            --accent-red: #ff453a;
            --accent-yellow: #ffd60a;
            --accent-purple: #bf5af2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            height: 100vh;
            display: flex;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--sidebar-border);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-left: 12px;
            color: var(--text-primary);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--hover-bg); }
        .nav-item.active { background: var(--active-bg); color: var(--text-primary); }
        .nav-icon {
            width: 26px; height: 26px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #fff;
        }
        .icon-all { background: #8e8e93; }
        .icon-today { background: var(--accent-blue); }
        .icon-done { background: #34c759; }
        .icon-undone { background: var(--accent-orange); }
        .icon-important { background: var(--accent-yellow); color: #1c1c1e; }
        .icon-scheduled { background: var(--accent-purple); }
        .nav-count {
            margin-left: auto;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--hover-bg);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .nav-item.active .nav-count { background: var(--active-bg); color: var(--text-tertiary); }

        .data-actions {
            margin-top: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
        }
        .data-actions button {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: background 0.2s;
        }
        .data-actions button:hover { background: var(--hover-bg); }

        .theme-toggle {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            user-select: none;
        }
        .theme-toggle:hover { background: var(--hover-bg); }
        .theme-icon { font-size: 16px; }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 40px 50px 100px;
            overflow-y: auto;
        }
        .header {
            margin-bottom: 20px;
        }
        .header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .header h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .header .subtitle {
            font-size: 15px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-bottom: 14px;
        }

        /* Search */
        .search-box {
            position: relative;
            max-width: 300px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Task List */
        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px var(--card-shadow);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .task-list { list-style: none; overflow-y: auto; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid var(--divider);
            transition: background 0.15s, transform 0.15s, opacity 0.15s;
            animation: slideIn 0.25s ease both;
            cursor: grab;
        }
        .task-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            cursor: grabbing;
            background: var(--active-bg);
        }
        .task-item.drag-over {
            border-top: 2px solid var(--accent-blue);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: var(--hover-bg); }

        .select-box {
            width: 18px; height: 18px;
            border: 2px solid #c7c7cc;
            border-radius: 5px;
            margin-right: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .select-box.selected {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        .select-box.selected::after {
            content: '✓';
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }

        /* Custom Checkbox */
        .check-circle {
            width: 22px; height: 22px;
            border: 2px solid #c7c7cc;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            margin-right: 14px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .check-circle svg {
            width: 12px; height: 12px;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
        }
        .task-item.completed .check-circle {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }
        .task-item.completed .check-circle svg {
            opacity: 1;
            transform: scale(1);
        }
        .task-item.completed .task-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }
        .task-text {
            font-size: 15.5px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.2s;
            cursor: text;
            padding: 2px 4px;
            margin: -2px -4px;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-text:hover { background: var(--hover-bg); }
        .task-text[contenteditable="true"] {
            background: var(--sidebar-bg);
            outline: 2px solid var(--accent-blue);
            text-decoration: none !important;
            color: var(--text-primary) !important;
            white-space: normal;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 4px;
        }
        .task-date {
            color: var(--text-muted);
        }
        .task-date.overdue {
            color: var(--accent-red);
            font-weight: 600;
        }
        .task-flag {
            color: var(--accent-yellow);
            font-size: 11px;
        }

        .flag-btn {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s, background 0.2s, color 0.2s;
            flex-shrink: 0;
            margin-right: 4px;
            font-size: 16px;
        }
        .task-item:hover .flag-btn { opacity: 1; }
        .flag-btn:hover { background: var(--hover-bg); }
        .flag-btn.active {
            color: var(--accent-yellow);
            opacity: 1;
        }

        .delete-btn {
            width: 28px; height: 28px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--accent-red);
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .task-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(255,69,58,0.08); }
        .delete-btn svg { width: 16px; height: 16px; }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
            flex: 1;
        }
        .empty-icon {
            width: 70px; height: 70px;
            background: var(--empty-icon-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            font-size: 28px;
        }
        .empty-title { font-size: 18px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px; }
        .empty-desc { font-size: 14px; }

        /* iOS Install Banner */
        .ios-install-banner {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            color: #1c1c1e;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 150;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 90vw;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .ios-install-banner.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .ios-install-banner button {
            background: rgba(0,0,0,0.06);
            border: none;
            width: 26px; height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            color: #555;
            display: flex; align-items: center; justify-content: center;
        }
        @media (prefers-color-scheme: dark) {
            :root:not(.force-light) .ios-install-banner {
                background: rgba(40,40,48,0.95);
                color: #fff;
                border-color: rgba(255,255,255,0.08);
            }
            :root:not(.force-light) .ios-install-banner button {
                background: rgba(255,255,255,0.1);
                color: #aaa;
            }
        }
        :root.force-dark .ios-install-banner {
            background: rgba(40,40,48,0.95);
            color: #fff;
            border-color: rgba(255,255,255,0.08);
        }
        :root.force-dark .ios-install-banner button {
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }

        /* Batch Toolbar */
        .batch-bar {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(40,40,48,0.95);
            color: #fff;
            padding: 10px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .batch-bar.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .batch-bar button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .batch-bar button:hover { background: rgba(255,255,255,0.25); }
        .batch-bar .batch-count { font-weight: 700; margin-right: 4px; }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            background: rgba(40,40,48,0.95);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast button {
            background: transparent;
            border: none;
            color: var(--accent-blue);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* Bottom Input Bar */
        .input-bar {
            position: absolute;
            bottom: 28px;
            left: 50px;
            right: 50px;
            background: var(--inputbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 14px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 32px var(--inputbar-shadow);
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
        }
        .plus-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--accent-orange);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 300;
            flex-shrink: 0;
        }
        .input-bar input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15.5px;
            font-weight: 500;
            outline: none;
            color: var(--text-primary);
            min-width: 0;
        }
        .input-bar input[type="text"]::placeholder { color: var(--text-muted); }
        .input-bar input[type="date"] {
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-tertiary);
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        .input-bar input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.4);
            cursor: pointer;
        }
        .input-bar button {
            padding: 7px 16px;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .input-bar button:hover { background: #0051d5; }

        /* Confetti */
        .confetti {
            position: fixed;
            pointer-events: none;
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: confetti-fall 0.8s ease-out forwards;
            z-index: 300;
        }
        @keyframes confetti-fall {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.5); opacity: 0; }
        }

        @media (max-width: 820px) {
            .sidebar { display: none; }
            .main { padding: 24px 20px 90px; }
            .input-bar { left: 20px; right: 20px; bottom: 20px; }
            .search-box { max-width: none; width: 100%; margin-top: 10px; }
            .header-top { flex-direction: column; align-items: flex-start; gap: 4px; }
            .batch-bar { left: 20px; right: 20px; transform: translateY(100px); width: auto; justify-content: space-between; }
            .batch-bar.active { transform: translateY(0); left: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>提醒事项</h2>
        <div class="nav-item active" data-filter="all">
            <div class="nav-icon icon-all">&#9776;</div>
            <span>全部</span>
            <span class="nav-count" id="count-all">0</span>
        </div>
        <div class="nav-item" data-filter="today">
            <div class="nav-icon icon-today">&#9733;</div>
            <span>今天</span>
            <span class="nav-count" id="count-today">0</span>
        </div>
        <div class="nav-item" data-filter="scheduled">
            <div class="nav-icon icon-scheduled">&#128197;</div>
            <span>已计划</span>
            <span class="nav-count" id="count-scheduled">0</span>
        </div>
        <div class="nav-item" data-filter="important">
            <div class="nav-icon icon-important">&#9733;</div>
            <span>重要</span>
            <span class="nav-count" id="count-important">0</span>
        </div>
        <div class="nav-item" data-filter="undone">
            <div class="nav-icon icon-undone">&#9675;</div>
            <span>未完成</span>
            <span class="nav-count" id="count-undone">0</span>
        </div>
        <div class="nav-item" data-filter="done">
            <div class="nav-icon icon-done">&#10003;</div>
            <span>已完成</span>
            <span class="nav-count" id="count-done">0</span>
        </div>

        <div class="data-actions">
            <button id="btn-export">📤 导出数据</button>
            <button id="btn-import">📥 导入数据</button>
            <input type="file" id="file-import" accept=".json" style="display:none">
        </div>

        <div class="theme-toggle" id="theme-toggle">
            <span class="theme-icon" id="theme-icon">&#127769;</span>
            <span id="theme-text">切换深色模式</span>
        </div>
    </aside>

    <main class="main">
        <div class="header">
            <div class="header-top">
                <h1 id="page-title">全部</h1>
                <div class="search-box">
                    <span class="search-icon">&#128269;</span>
                    <input type="text" id="search" placeholder="搜索任务… (Cmd+K)">
                </div>
            </div>
            <div class="subtitle" id="page-subtitle">管理你的日常任务</div>
        </div>

        <div class="task-card">
            <ul class="task-list" id="todo-list"></ul>
            <div class="empty-state" id="empty-state" style="display:none;">
                <div class="empty-icon">&#128466;</div>
                <div class="empty-title">暂无任务</div>
                <div class="empty-desc">按 N 键快速添加，或点击下方输入框</div>
            </div>
        </div>

        <div class="input-bar">
            <div class="plus-icon">+</div>
            <input type="text" id="input" placeholder="添加新任务…">
            <input type="date" id="due-date">
            <button id="btn">添加</button>
        </div>
    </main>

    <div class="ios-install-banner" id="ios-banner">
        <span>📲 点击底部 <b>分享按钮 ⬆️</b>，然后选择 <b>"添加到主屏幕"</b></span>
        <button id="ios-banner-close">✕</button>
    </div>

    <div class="batch-bar" id="batch-bar">
        <span><span class="batch-count" id="batch-count">0</span> 项已选择</span>
        <div style="display:flex;gap:8px;">
            <button id="batch-complete">标记完成</button>
            <button id="batch-delete" style="color:#ff453a">删除</button>
            <button id="batch-clear">取消</button>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toast-msg">任务已删除</span>
        <button id="toast-undo">撤销</button>
    </div>

    <script>
        /* PWA */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';
        let searchQuery = '';
        let selectedIds = new Set();
        let undoStack = [];
        let undoTimer = null;

        const titles = {
            all: '全部',
            today: '今天',
            scheduled: '已计划',
            important: '重要',
            undone: '未完成',
            done: '已完成'
        };

        /* Theme */
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        function applyTheme(isDark) {
            const root = document.documentElement;
            if (isDark) {
                root.classList.add('force-dark');
                root.classList.remove('force-light');
                document.getElementById('theme-icon').textContent = '☀️';
                document.getElementById('theme-text').textContent = '切换浅色模式';
            } else {
                root.classList.add('force-light');
                root.classList.remove('force-dark');
                document.getElementById('theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = '切换深色模式';
            }
        }
        if (savedTheme === 'dark') applyTheme(true);
        else if (savedTheme === 'light') applyTheme(false);
        else applyTheme(systemDark);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('force-dark');
            applyTheme(!isDark);
            localStorage.setItem('theme', !isDark ? 'dark' : 'light');
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches);
        });

        /* Data */
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateCounts();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const isToday = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            if (isToday) return '今天';
            return `${d.getMonth()+1}月${d.getDate()}日`;
        }

        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            d.setHours(23, 59, 59, 999);
            return d < new Date();
        }

        function updateCounts() {
            const now = new Date();
            document.getElementById('count-all').textContent = tasks.length;
            document.getElementById('count-today').textContent = tasks.filter(t => {
                const d = new Date(t.createdAt);
                return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).length;
            document.getElementById('count-scheduled').textContent = tasks.filter(t => t.dueDate).length;
            document.getElementById('count-important').textContent = tasks.filter(t => t.important).length;
            document.getElementById('count-undone').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('count-done').textContent = tasks.filter(t => t.completed).length;
        }

        /* Confetti */
        function confetti(x, y) {
            const colors = ['#ff9500', '#007aff', '#34c759', '#ff3b30', '#af52de', '#ffcc00'];
            for (let i = 0; i < 18; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 60;
                el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }
        }

        /* Render */
        function getFilteredTasks() {
            const now = new Date();
            return tasks.filter(t => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'done') return t.completed;
                if (currentFilter === 'undone') return !t.completed;
                if (currentFilter === 'today') {
                    const d = new Date(t.createdAt);
                    return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }
                if (currentFilter === 'scheduled') return !!t.dueDate;
                if (currentFilter === 'important') return t.important;
                return true;
            }).filter(t => t.text.toLowerCase().includes(searchQuery.toLowerCase()));
        }

        function renderList() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';

            let filtered = getFilteredTasks();
            filtered.sort((a, b) => {
                if (a.important !== b.important) return b.important - a.important;
                return a.completed - b.completed;
            });

            updateBatchBar();

            if (filtered.length === 0) {
                document.getElementById('empty-state').style.display = 'flex';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                filtered.forEach((task, idx) => {
                    const realIndex = tasks.indexOf(task);
                    const li = document.createElement('li');
                    li.className = 'task-item' + (task.completed ? ' completed' : '');
                    li.draggable = true;
                    li.dataset.id = task.id || task.text + task.createdAt;
                    if (!task.id) task.id = li.dataset.id;

                    /* Drag & Drop */
                    li.addEventListener('dragstart', e => {
                        li.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', task.id);
                    });
                    li.addEventListener('dragend', () => {
                        li.classList.remove('dragging');
                        document.querySelectorAll('.task-item').forEach(i => i.classList.remove('drag-over'));
                    });
                    li.addEventListener('dragover', e => {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        li.classList.add('drag-over');
                    });
                    li.addEventListener('dragleave', () => {
                        li.classList.remove('drag-over');
                    });
                    li.addEventListener('drop', e => {
                        e.preventDefault();
                        li.classList.remove('drag-over');
                        const draggedId = e.dataTransfer.getData('text/plain');
                        if (draggedId === task.id) return;
                        const fromIndex = tasks.findIndex(t => t.id === draggedId);
                        const toIndex = tasks.findIndex(t => t.id === task.id);
                        if (fromIndex < 0 || toIndex < 0) return;
                        const [moved] = tasks.splice(fromIndex, 1);
                        tasks.splice(toIndex, 0, moved);
                        saveTasks();
                        renderList();
                    });

                    const selectBox = document.createElement('div');
                    selectBox.className = 'select-box' + (selectedIds.has(task.id) ? ' selected' : '');
                    selectBox.addEventListener('click', e => {
                        e.stopPropagation();
                        if (selectedIds.has(task.id)) selectedIds.delete(task.id);
                        else selectedIds.add(task.id);
                        renderList();
                    });

                    const check = document.createElement('div');
                    check.className = 'check-circle';
                    check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    check.addEventListener('click', e => {
                        const rect = check.getBoundingClientRect();
                        task.completed = !task.completed;
                        if (task.completed) confetti(rect.left + 11, rect.top + 11);
                        saveTasks();
                        selectedIds.delete(task.id);
                        renderList();
                    });

                    const content = document.createElement('div');
                    content.className = 'task-content';

                    const text = document.createElement('div');
                    text.className = 'task-text';
                    text.textContent = task.text;
                    text.title = '双击编辑';
                    text.addEventListener('dblclick', () => {
                        if (text.isContentEditable) return;
                        text.contentEditable = true;
                        text.focus();
                        const range = document.createRange();
                        range.selectNodeContents(text);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                    });
                    text.addEventListener('blur', () => {
                        const newText = text.textContent.trim();
                        if (newText) { task.text = newText; saveTasks(); }
                        text.textContent = task.text;
                        text.contentEditable = false;
                    });
                    text.addEventListener('keydown', e => {
                        if (e.key === 'Enter') { e.preventDefault(); text.blur(); }
                        else if (e.key === 'Escape') { text.textContent = task.text; text.contentEditable = false; }
                    });

                    const meta = document.createElement('div');
                    meta.className = 'task-meta';
                    if (task.dueDate) {
                        const dateSpan = document.createElement('span');
                        dateSpan.className = 'task-date' + (isOverdue(task.dueDate) && !task.completed ? ' overdue' : '');
                        dateSpan.textContent = formatDate(task.dueDate);
                        meta.appendChild(dateSpan);
                    }
                    if (task.important) {
                        const flagSpan = document.createElement('span');
                        flagSpan.className = 'task-flag';
                        flagSpan.textContent = '★ 重要';
                        meta.appendChild(flagSpan);
                    }

                    content.appendChild(text);
                    if (meta.children.length) content.appendChild(meta);

                    const flagBtn = document.createElement('div');
                    flagBtn.className = 'flag-btn' + (task.important ? ' active' : '');
                    flagBtn.innerHTML = task.important ? '&#9733;' : '&#9734;';
                    flagBtn.title = task.important ? '取消标记' : '标记为重要';
                    flagBtn.addEventListener('click', e => {
                        e.stopPropagation();
                        task.important = !task.important;
                        saveTasks();
                        renderList();
                    });

                    const del = document.createElement('div');
                    del.className = 'delete-btn';
                    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                    del.addEventListener('click', e => {
                        e.stopPropagation();
                        deleteWithUndo([task]);
                    });

                    li.appendChild(selectBox);
                    li.appendChild(check);
                    li.appendChild(content);
                    li.appendChild(flagBtn);
                    li.appendChild(del);
                    list.appendChild(li);
                });
            }
        }

        /* Delete & Undo */
        function deleteWithUndo(items) {
            const ids = items.map(t => t.id);
            undoStack = items.map(t => ({ task: {...t}, index: tasks.findIndex(x => x.id === t.id) }));
            tasks = tasks.filter(t => !ids.includes(t.id));
            selectedIds.clear();
            saveTasks();
            renderList();
            showToast(`已删除 ${items.length} 项任务`, () => {
                undoStack.forEach(u => {
                    if (u.index >= 0 && u.index <= tasks.length) tasks.splice(u.index, 0, u.task);
                    else tasks.push(u.task);
                });
                selectedIds.clear();
                saveTasks();
                renderList();
                hideToast();
            });
        }

        function showToast(msg, onUndo) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('active');
            const btn = document.getElementById('toast-undo');
            btn.onclick = () => { if (onUndo) onUndo(); };
            if (undoTimer) clearTimeout(undoTimer);
            undoTimer = setTimeout(hideToast, 4000);
        }
        function hideToast() {
            document.getElementById('toast').classList.remove('active');
        }

        /* Batch */
        function updateBatchBar() {
            const bar = document.getElementById('batch-bar');
            const count = selectedIds.size;
            document.getElementById('batch-count').textContent = count;
            if (count > 0) bar.classList.add('active');
            else bar.classList.remove('active');
        }
        document.getElementById('batch-complete').addEventListener('click', () => {
            let changed = false;
            tasks.forEach(t => {
                if (selectedIds.has(t.id)) { t.completed = true; changed = true; }
            });
            if (changed) { selectedIds.clear(); saveTasks(); renderList(); }
        });
        document.getElementById('batch-delete').addEventListener('click', () => {
            const toDelete = tasks.filter(t => selectedIds.has(t.id));
            if (toDelete.length) deleteWithUndo(toDelete);
        });
        document.getElementById('batch-clear').addEventListener('click', () => {
            selectedIds.clear(); renderList();
        });

        /* Nav */
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentFilter = item.dataset.filter;
                document.getElementById('page-title').textContent = titles[currentFilter];
                selectedIds.clear();
                renderList();
            });
        });

        /* Search */
        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', e => {
            searchQuery = e.target.value.trim();
            renderList();
        });

        /* Add Task */
        const taskInput = document.getElementById('input');
        function addTask() {
            const value = taskInput.value.trim();
            const dueDate = document.getElementById('due-date').value || null;
            if (value) {
                const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
                tasks.unshift({ id, text: value, completed: false, important: false, createdAt: new Date().toISOString(), dueDate });
                saveTasks();
                taskInput.value = '';
                document.getElementById('due-date').value = '';
                searchInput.value = '';
                searchQuery = '';
                if (currentFilter !== 'all') {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelector('.nav-item[data-filter="all"]').classList.add('active');
                    currentFilter = 'all';
                    document.getElementById('page-title').textContent = titles['all'];
                }
                renderList();
            }
        }
        document.getElementById('btn').addEventListener('click', addTask);
        taskInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        /* Shortcuts */
        document.addEventListener('keydown', e => {
            const tag = document.activeElement?.tagName;
            const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable;
            if (e.metaKey || e.ctrlKey) {
                if (e.key.toLowerCase() === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                return;
            }
            if (isTyping) {
                if (e.key === 'Escape') document.activeElement.blur();
                return;
            }
            if (e.key.toLowerCase() === 'n') {
                e.preventDefault();
                taskInput.focus();
            } else if (e.key === 'Escape') {
                selectedIds.clear(); renderList(); hideToast();
            }
        });

        /* Import / Export */
        document.getElementById('btn-export').addEventListener('click', () => {
            const data = JSON.stringify(tasks, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `提醒事项备份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('btn-import').addEventListener('click', () => {
            document.getElementById('file-import').click();
        });
        document.getElementById('file-import').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported)) {
                        undoStack = [{ task: null, index: -1, prev: tasks }];
                        tasks = imported.map(t => ({ ...t, id: t.id || (Date.now().toString(36)+Math.random().toString(36).slice(2)) }));
                        saveTasks();
                        renderList();
                        showToast('数据导入成功', null);
                    } else {
                        showToast('文件格式不正确', null);
                    }
                } catch {
                    showToast('导入失败：无法解析文件', null);
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        /* iOS Install Banner */
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isStandalone = window.navigator.standalone === true;
        const isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|QQ|MicroMessenger|UCBrowser|baiduboxapp/.test(navigator.userAgent);
        const iosBanner = document.getElementById('ios-banner');
        if (isIOS && !isStandalone && isSafari) {
            const dismissed = sessionStorage.getItem('iosBannerDismissed');
            if (!dismissed) {
                setTimeout(() => iosBanner.classList.add('active'), 1500);
            }
        }
        document.getElementById('ios-banner-close').addEventListener('click', () => {
            iosBanner.classList.remove('active');
            sessionStorage.setItem('iosBannerDismissed', '1');
        });

        /* Init */
        updateCounts();
        renderList();
    </script>
</body>
</html>
